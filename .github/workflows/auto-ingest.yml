name: auto-ingest

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      stage:
        description: 'full | candidates_only | assets_only'
        required: false
        default: 'assets_only'
      series_slug:
        description: 'Optional content_series slug to scope candidate generation'
        required: false
        default: ''

concurrency:
  group: auto-ingest
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run auto:ingest-tick
        env:
          AUTO_INGEST_STAGE: ${{ github.event.inputs.stage || 'assets_only' }}
          POST_CANDIDATE_SERIES_SLUG: ${{ github.event.inputs.series_slug || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_OAUTH_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRETS_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_PROCESSED_RAW_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_PROCESSED_RAW_FOLDER_ID }}
          GOOGLE_DRIVE_READY_FOR_REVIEW_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_READY_FOR_REVIEW_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOMINATIM_USER_AGENT: ${{ secrets.NOMINATIM_USER_AGENT }}
          POST_CANDIDATE_BATCH_DAYS: '10'
          POST_CANDIDATE_MAX_ASSETS: '80'
          POST_CANDIDATE_DAILY_TARGET: '2'
          FR94_PROMPT_VERSION: '2026-05-23-v1'
      - name: Mark auto-ingest failed
        if: failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase credentials missing; cannot mark pipeline failure"
            exit 0
          fi

          finished_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          payload="$(jq -n \
            --arg finished_at "$finished_at" \
            --arg run_url "$RUN_URL" \
            '{
              last_run_finished_at: $finished_at,
              last_run_status: "error",
              last_run_summary: {
                error: "GitHub Action failed before auto-ingest could report a final status",
                github_run_url: $run_url
              },
              updated_at: $finished_at
            }')"

          curl --fail-with-body \
            --request PATCH \
            --url "$SUPABASE_URL/rest/v1/pipeline_settings?singleton=eq.true&last_run_status=in.(dispatching,running)" \
            --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Content-Type: application/json" \
            --header "Prefer: return=minimal" \
            --data "$payload"
