name: prepare-publishing

on:
  workflow_dispatch:
    inputs:
      candidate_id:
        description: 'post_candidates.id to stage (validate-only)'
        required: true

concurrency:
  group: prepare-publishing-${{ github.event.inputs.candidate_id }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run prepare:publishing -- --candidate-id=${{ github.event.inputs.candidate_id }} --validate-only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_OAUTH_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRETS_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_PROCESSED_RAW_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_PROCESSED_RAW_FOLDER_ID }}
          GOOGLE_DRIVE_READY_FOR_REVIEW_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_READY_FOR_REVIEW_FOLDER_ID }}
          INSTAGRAM_GRAPH_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_GRAPH_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          PUBLIC_MEDIA_BUCKET_NAME: ${{ secrets.PUBLIC_MEDIA_BUCKET_NAME }}
          PUBLIC_MEDIA_BASE_URL: ${{ secrets.PUBLIC_MEDIA_BASE_URL }}
